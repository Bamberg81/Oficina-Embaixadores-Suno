html_content = """
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raiz de Luz - Portal Meditativo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Raleway', sans-serif;
            color: #fff;
            background-color: #0b0d17;
        }

        /* Fundo com imagem fixa e overlay escuro */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1528715471579-d1bcf0ba5e83?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(11,13,23,0.8) 100%);
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        /* Seção de Vídeo */
        .video-section {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Player de Áudio */
        .audio-player {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .play-pause-btn {
            background: #ffd700;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s, background 0.3s;
        }

        .play-pause-btn:hover {
            transform: scale(1.05);
            background: #fff;
        }

        .play-pause-btn svg {
            width: 24px;
            height: 24px;
            fill: #000;
        }

        .player-controls {
            flex-grow: 1;
        }

        .timeline-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            accent-color: #ffd700;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            font-family: monospace;
        }

        /* Estilo da Letra (opcional, para visual) */
        .lyrics {
            text-align: center;
            line-height: 2;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.9);
            margin-top: 20px;
            padding-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <div class="container">
        <header>
            <h1>RAIZ DE LUZ</h1>
            <div class="subtitle">Mantra de Autoconhecimento</div>
        </header>

        <div class="video-section">
            <iframe src="https://www.youtube.com/embed/S_mU2G6Y7mU" 
                    title="Vídeo de Meditação" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>

        <div class="audio-player">
            <button class="play-pause-btn" id="playPauseBtn">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <div class="player-controls">
                <div class="timeline-container">
                    <input type="range" id="seekSlider" value="0" max="100">
                    <div class="time-labels">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="lyrics">
            <p><i>Kundalini em ascensão, livre, una...<br>Em cada chakra, um novo céu me inunda.</i></p>
        </div>
    </div>

    <audio id="audioSource">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audioSource');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const seekSlider = document.getElementById('seekSlider');
        const currentTimeDisplay = document.getElementById('currentTime');
        const durationDisplay = document.getElementById('duration');

        // Play / Pause
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        });

        // Atualizar barra de progresso
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            seekSlider.value = progress || 0;
            currentTimeDisplay.textContent = formatTime(audio.currentTime);
        });

        // Carregar duração
        audio.addEventListener('loadedmetadata', () => {
            durationDisplay.textContent = formatTime(audio.duration);
        });

        // Seek (Pular para parte da música)
        seekSlider.addEventListener('input', () => {
            const time = (seekSlider.value / 100) * audio.duration;
            audio.currentTime = time;
        });

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (sec < 10) sec = `0${sec}`;
            return `${min}:${sec}`;
        }
    </script>
</body>
</html>
